version: '3.8'

services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: hookforgeuser
      POSTGRES_PASSWORD: wingardium_laviosa
      POSTGRES_DB: hookforge
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hookforgeuser -d hookforge"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://hookforgeuser:wingardium_laviosa@postgres:5432/hookforge
      JWT_ACCESS_SECRET: hookforge_access_secret_key
      JWT_REFRESH_SECRET: hookforge_refresh_secret_key
      PORT: 3001
      NODE_ENV: production
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    environment:
      DATABASE_URL: postgresql://hookforgeuser:wingardium_laviosa@postgres:5432/hookforge
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      API_PORT: 3001
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    depends_on:
      - api

volumes:
  postgres_data: